<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#5b4fcf" />
  <title>TESIS DISEÑO EDITORIAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>TESIS DISEÑO EDITORIAL</h1>

    <section class="progress-card" aria-label="Progreso general">
      <div class="progress-row">
        <span>Bloques completados</span>
        <strong><span id="completed-count">0</span>/<span id="total-count">0</span></strong>
      </div>
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Porcentaje total">
        <div id="main-progress" class="progress-fill"></div>
      </div>
      <div class="progress-row progress-row-footer">
        <span>Avance total</span>
        <strong id="progress-percent">0%</strong>
      </div>
    </section>
  </header>

  <main>
    <section id="chapters-container" class="chapters-list" aria-label="Capítulos"></section>
  </main>

  <footer class="app-footer">
    <button id="reset-btn" class="reset-btn" type="button">Resetear progreso</button>
  </footer>

  <template id="chapter-template">
    <article class="chapter-card" data-chapter-id="">
      <button class="chapter-header" type="button" aria-expanded="false">
        <div class="chapter-header-main">
          <span class="chapter-icon" aria-hidden="true">📘</span>
          <div>
            <h2 class="chapter-title"></h2>
            <p class="chapter-meta"><span class="chapter-state">Pendiente</span> · <span class="chapter-counter">0/7</span></p>
          </div>
        </div>
        <span class="chapter-arrow" aria-hidden="true">⌄</span>
      </button>

      <div class="chapter-content" hidden>
        <ul class="task-list"></ul>

        <div class="notes-area">
          <label class="notes-label" for="">Notas del capítulo</label>
          <textarea class="notes-input" rows="4" placeholder="Anota pendientes, ideas o decisiones editoriales..."></textarea>
        </div>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
